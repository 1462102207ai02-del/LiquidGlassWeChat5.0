name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang git wget xz-utils perl libplist-utils

    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        bash $HOME/theos/bin/install-theos

    - name: Build
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/toolchain/linux/iphone/bin:$PATH
        make package FINALPACKAGE=1

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: deb
        path: packages/*.deb
