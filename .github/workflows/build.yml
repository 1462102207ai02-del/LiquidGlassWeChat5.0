name: Build Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          clang \
          git \
          wget \
          xz-utils \
          perl \
          libplist-utils \
          dpkg \
          dpkg-dev

    - name: Install Theos
      run: |
        git clone https://github.com/theos/theos.git $HOME/theos

    - name: Install iOS SDK
      run: |
        rm -rf $HOME/theos/sdks
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks

    - name: Build package
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$THEOS/toolchain/linux/iphone/bin:$PATH
        make clean
        make package FINALPACKAGE=1

    - name: Upload deb
      uses: actions/upload-artifact@v4
      with:
        name: LiquidGlassWeChat
        path: packages/*.deb
